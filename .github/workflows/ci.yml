name: C++ CI

on:
  push:
    branches: [ "main", "work" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CMake
        run: sudo apt-get update && sudo apt-get install -y cmake g++

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build

      - name: Run Huffman unit tests
        run: ./build/test_huffman

      - name: Run bit I/O tests
        run: ./build/test_bit_io

      - name: Run integration tests
        run: ./build/test_integration
